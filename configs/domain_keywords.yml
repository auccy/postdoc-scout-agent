# Initial keyword taxonomy for translational supervisor scouting.
preferred_domains:
  digital_medicine:
    - digital medicine
    - remote monitoring
    - wearable
    - patient-generated data
  clinical_ai:
    - clinical ai
    - medical ai
    - predictive model
    - risk prediction
    - clinical decision support
  disease_areas:
    - Alzheimer's disease
    - ADRD
    - dementia
    - oncology
    - cancer
    - neurodegeneration
  clinical_data:
    - electronic health record
    - EHR
    - real-world data
    - registry
    - cohort
  translational_tasks:
